# Create multiple replicas of your pod. Always runs desired number of pods. 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  # These labels are replicaset labels reference
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
  # annotations:
  #   kubernetes.io/change-cause: "Moving to 1.29.7"
spec:
  replicas: 2
  selector:
  # Using these labels, replicaset selects the pod.
    matchLabels:
      project: roboshop
      purpose: rs-demo
      tier: frontend
      component: frontend
  # This is Pod definition, Pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        purpose: rs-demo
        tier: frontend
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:stable-alpine3.23-perl