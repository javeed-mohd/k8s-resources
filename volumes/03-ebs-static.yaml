#  Physical representation of the disk and Equivalent object/resource for the disk inside k8S cluster is Persistent Volume.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs-static
spec:
  # Volume can be mounted as read-write by a single node. Multiple pods on that same node can still access the volume.
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 5Gi      # It should be less than or equal to your disk size.
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-0f66b40ccee8ec08d     # Replace with your specified volume ID
---
# PersistentVolumeClaim is claiming the PV that it needs storage.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-static
spec:
  storageClassName: ""      # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs-static    # This is the Persistent Volume name.    
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: app
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: html-data
      mountPath: /usr/share/nginx/html
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1b       # Replace with your specified az
  volumes:
  - name: html-data
    persistentVolumeClaim:
      claimName: ebs-static